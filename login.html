<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk Akun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
html, body{
width:100%;
height:100%;
/* LATAR BELAKANG SANGAT JELAS: lapisan biru sangat tipis */
background:linear-gradient(rgba(0, 40, 90, 0.35), rgba(0, 90, 180, 0.35)), url("bg-login.jpg");
background-size: cover;
background-position: center center;
background-repeat: no-repeat;
background-attachment: fixed;
min-height: 100vh;
padding:0;
margin:0;
display:flex;
align-items:center;
justify-content:center;
}

.wadah{
width:100%;
max-width:420px;
padding:25px 20px;
text-align:center;
margin:15px;
}

.judul{font-size:24px;font-weight:bold;color:#ffffff;margin-bottom:8px;text-shadow:0 1px 3px rgba(0,0,0,0.3);}
.sub-judul{font-size:14px;color:#f0f7ff;margin-bottom:25px;line-height:1.4;text-shadow:0 1px 2px rgba(0,0,0,0.2);}

.form-group{text-align:left;margin-bottom:18px;}
.baris-label{display:flex;gap:10px;margin-bottom:6px;}
.label-negara{width:95px;font-size:14px;font-weight:bold;color:#ffffff;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.label-nomor{flex:1;font-size:14px;font-weight:bold;color:#ffffff;text-shadow:0 1px 2px rgba(0,0,0,0.2);}

.kolom-nomor{display:flex;gap:10px;}
.pilih-negara{
width:95px;padding:13px 8px;font-size:15px;border:2px solid #007bff;border-radius:10px;
background:#ffffff;color:#004a9f;font-weight:bold;cursor:pointer;outline:none;
transition:0.2s;
}
.pilih-negara:focus{border-color:#003d80;}
.input-nomor{
flex:1;padding:13px;font-size:16px;border:2px solid #007bff;border-radius:10px;outline:none;
transition:0.2s;background:#ffffff;color:#000000;
}
.input-nomor::placeholder{color:#888888;}
.input-nomor:focus{border-color:#003d80;box-shadow:0 0 8px rgba(0,91,191,0.2);}

.teks-syarat{
font-size:12px;color:#ffffff;line-height:1.5;text-align:center;margin-bottom:12px;
opacity:0.98;text-shadow:0 1px 2px rgba(0,0,0,0.2);
}

.tombol-kirim-otp, .tombol-verifikasi{
display:block;width:100%;padding:15px;font-size:18px;font-weight:bold;color:#fff;border:none;
border-radius:50px;background:linear-gradient(90deg, #004a9f, #007bff, #004a9f);
box-shadow:0 6px 20px rgba(0,0,0,0.3);margin-bottom:10px;transition:all 0.2s ease;cursor:pointer;
background-size:200% 100%;animation: gerakTombol 3s linear infinite;
}
@keyframes gerakTombol{0%{background-position:0 0;}100%{background-position:200% 0;}}
.tombol-kirim-otp:active, .tombol-verifikasi:active{transform:scale(0.96);}

.bagian-otp{display:none;}
.catatan{font-size:13px;color:#ffffff;margin-top:6px;font-weight:500;text-shadow:0 1px 2px rgba(0,0,0,0.2);}

@media(max-width:480px){
.judul{font-size:20px;}
.pilih-negara{width:85px;font-size:13px;}
.label-negara{width:85px;font-size:13px;}
.label-nomor{font-size:13px;}
}
</style>
</head>
<body>

<div class="wadah">
<div class="judul">MASUK KE AKUN</div>
<div class="sub-judul">Masukkan nomor HP Anda untuk mendapatkan kode verifikasi</div>

<div class="form-group" id="bagian-nomor">
<div class="baris-label">
<span class="label-negara">Negara</span>
<span class="label-nomor">Nomor</span>
</div>
<div class="kolom-nomor">
<select class="pilih-negara">
<option value="+62">🇮🇩 +62</option>
<option value="+60">🇲🇾 +60</option>
<option value="+65">🇸🇬 +65</option>
<option value="+66">🇹🇭 +66</option>
<option value="+84">🇻🇳 +84</option>
</select>
<input type="tel" class="input-nomor" id="nohp" placeholder="812 3456 7890" maxlength="12">
</div>
<p class="catatan">Nomor Sudah Tidak Aktif?</p>
</div>

<p class="teks-syarat">Kamu akan menggunakan nomor Hp Sebagai ID kamu dan untuk mengamankan Akun kamu. Dengan melanjutkan, kamu juga setuju dengan S&K serta kebijakan privasi kami.</p>

<button class="tombol-kirim-otp" id="btn-kirim" onclick="kirimOTP()">KIRIM KODE OTP</button>

<div class="bagian-otp" id="bagian-otp">
<div class="form-group">
<label class="label">Masukkan Kode OTP</label>
<input type="text" class="input" id="kodeotp" placeholder="Masukkan 4 digit kode" maxlength="4">
</div>
<button class="tombol-verifikasi" onclick="verifikasiKode()">VERIFIKASI & LANJUTKAN</button>
</div>
</div>

<script>
function kirimOTP(){
const nohp = document.getElementById('nohp').value;
if(nohp.length < 9){
alert('Masukkan nomor HP yang benar!');
return;
}
document.getElementById('bagian-nomor').style.display = 'none';
document.getElementById('btn-kirim').style.display = 'none';
document.getElementById('bagian-otp').style.display = 'block';
alert('Kode OTP telah dikirim ke nomor Anda (contoh: 1234)');
}

function verifikasiKode(){
const kode = document.getElementById('kodeotp').value;
if(kode.length < 4){
alert('Masukkan 4 digit kode OTP!');
return;
}
const pilih = new URLSearchParams(window.location.search).get('pilih') || '10';
window.location.href = 'isi-nomor-' + pilih + 'jt.html';
}
</script>

</body>
  </html>
