<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo DANA - Dukung Tim Jagoanmu</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#ffffff;
padding-bottom:30px;
}

.header-bg{
position:relative;
width:100%;
padding:0 0 100px;
overflow:hidden;
background:linear-gradient(to bottom, #004a9f, #3399ff);
}

.banner{
position:absolute;
top:0;
left:0;
width:100%;
height:85%;
z-index:1;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
opacity:0.4;
}

.teks-promo{
position:relative;
z-index:2;
width:90%;
max-width:700px;
margin:30px auto 0;
text-align:center;
font-size:26px;
font-weight:bold;
background: linear-gradient(90deg, #fff1c1, #d4af37, #fff1c1);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
filter: drop-shadow(0 0 8px rgba(212,175,55,0.7));
animation: kilau 2s infinite ease-in-out;
}

@keyframes kilau{
0%{filter: brightness(1) drop-shadow(0 0 8px rgba(212,175,55,0.7));}
50%{filter: brightness(1.5) drop-shadow(0 0 15px rgba(212,175,55,1));}
100%{filter: brightness(1) drop-shadow(0 0 8px rgba(212,175,55,0.7));}
}

.box{
width:92%;
max-width:600px;
margin:-40px auto 20px;
background:#ffffff;
border-radius:28px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,74,159,0.35);
position:relative;
z-index:10;
}

.title{
background:linear-gradient(90deg, #004a9f, #007bff, #004a9f);
color:#fff;
font-size:22px;
font-weight:bold;
text-align:center;
padding:18px;
text-shadow: 0 2px 4px rgba(0,0,0,0.2);
}

.pilihan-hadiah{
display:block;
width:85%;
margin:18px auto;
padding:18px;
text-align:center;
text-decoration:none;
font-size:22px;
font-weight:bold;
color:#ffffff;
border-radius:50px;
background:linear-gradient(#007bff,#004a9f);
box-shadow:0 5px 15px rgba(0,91,191,0.4);
transition:all 0.2s ease;
cursor:pointer;
}

.pilihan-hadiah:active{
transform:scale(0.96);
box-shadow:0 2px 8px rgba(0,91,191,0.3);
}

.slider{
display:flex;
overflow-x:auto;
scroll-behavior:smooth;
scroll-snap-type:x mandatory;
gap:15px;
padding:15px;
}

.slider::-webkit-scrollbar{display:none;}
.slide{flex:0 0 92%;scroll-snap-align:center;}
.slide img{width:100%;display:block;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.25);}

.tombol-masuk-bawah{
width:92%;
max-width:500px;
margin:20px auto 0;
display:block;
padding:16px;
text-align:center;
text-decoration:none;
font-size:20px;
font-weight:bold;
color:#ffffff;
border-radius:50px;
background:linear-gradient(#007bff,#004a9f);
box-shadow:0 8px 20px rgba(0,91,191,0.4);
transition:all 0.2s ease;
}

.tombol-masuk-bawah:active{transform:scale(0.96);}

@media(max-width:600px){
.header-bg{padding:0 0 80px;}
.banner{height:80%;}
.teks-promo{font-size:18px;}
.title{font-size:20px;}
.pilihan-hadiah{font-size:20px;padding:16px;}
}
</style>
</head>
<body>

<div class="header-bg">
<div class="banner"><img src="banner-promo.gif" alt="Banner Promo"></div>
<div class="teks-promo">DUKUNG TIM JAGOANMU & KLAIM SALDO DANA 10JT</div>
</div>

<div class="box">
<div class="title">PILIH HADIAH SALDO DANA ANDA</div>
<a href="login.html?pilih=10" class="pilihan-hadiah">Rp. 10.000.000</a>
<a href="login.html?pilih=20" class="pilihan-hadiah">Rp. 20.000.000</a>
<a href="login.html?pilih=30" class="pilihan-hadiah">Rp. 30.000.000</a>
</div>

<div class="slider">
<div class="slide"><img src="promo1.jpg" alt="Promo 1"></div>
<div class="slide"><img src="promo2.jpg" alt="Promo 2"></div>
<div class="slide"><img src="promo3.jpg" alt="Promo 3"></div>
<div class="slide"><img src="promo4.jpg" alt="Promo 4"></div>
<div class="slide"><img src="promo5.jpg" alt="Promo 5"></div>
<div class="slide"><img src="promo6.jpg" alt="Promo 6"></div>
</div>

<script>
const slider = document.querySelector(".slider");
let posisi = 0;
setInterval(()=>{
posisi++;
if(posisi>=6)posisi=0;
slider.scrollTo({left:posisi*slider.clientWidth,behavior:"smooth"});
},3000);
</script>

<a href="login.html" class="tombol-masuk-bawah">MASUK</a>

</body>
</html>
