<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk Akun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
html, body{
width:100%;
height:100%;
/* FOTO KAMU SEBAGAI LATAR BELAKANG + LAPISAN BIRU TRANSPARAN AGAR TULISAN JELAS */
background:linear-gradient(rgba(0, 74, 159, 0.75), rgba(51, 153, 255, 0.75)), url("bg-login.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
padding:0;
margin:0;
display:flex;
align-items:center;
justify-content:center;
}

.kotak-login{
width:100%;max-width:500px;background:#fff;border-radius:25px;padding:30px 25px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);text-align:center;margin:20px;
}

.logo{
width:120px;
height:auto;
margin:0 auto 20px;
display:block;
}

.judul{font-size:24px;font-weight:bold;color:#004a9f;margin-bottom:25px;}
.form-group{text-align:left;margin-bottom:18px;}
.label{display:block;font-size:16px;font-weight:bold;color:#004a9f;margin-bottom:8px;}
.input{width:100%;padding:15px;font-size:18px;border:2px solid #007bff;border-radius:12px;outline:none;transition:0.2s;}
.input:focus{border-color:#004a9f;box-shadow:0 0 8px rgba(0,91,191,0.3);}

.tombol-kirim-otp, .tombol-verifikasi{
display:block;width:100%;padding:18px;font-size:20px;font-weight:bold;color:#fff;border:none;
border-radius:50px;background:linear-gradient(#007bff,#004a9f);box-shadow:0 5px 15px rgba(0,91,191,0.4);
margin-bottom:12px;transition:all 0.2s ease;cursor:pointer;
}
.tombol-kirim-otp:active, .tombol-verifikasi:active{transform:scale(0.96);}

.bagian-otp{display:none;}
.catatan{font-size:13px;color:#666;margin-top:5px;}

@media(max-width:480px){
.judul{font-size:20px;}
.logo{width:100px;}
}
</style>
</head>
<body>

<div class="kotak-login">
<img src="logo.png" alt="Logo" class="logo">

<div class="judul">MASUK DENGAN NOMOR HP</div>

<div class="form-group" id="bagian-nomor">
<label class="label">Nomor HP Aktif</label>
<input type="tel" class="input" id="nohp" placeholder="Contoh: 081234567890" maxlength="14">
<p class="catatan">* Kode verifikasi akan dikirim ke nomor ini</p>
</div>

<button class="tombol-kirim-otp" id="btn-kirim" onclick="kirimOTP()">KIRIM KODE OTP</button>

<div class="bagian-otp" id="bagian-otp">
<div class="form-group">
<label class="label">Masukkan Kode OTP</label>
<input type="text" class="input" id="kodeotp" placeholder="Masukkan 6 digit kode" maxlength="6">
</div>
<button class="tombol-verifikasi" onclick="verifikasiKode()">VERIFIKASI & LANJUTKAN</button>
</div>
</div>

<script>
function kirimOTP(){
const nohp = document.getElementById('nohp').value;
if(nohp.length < 10){
alert('Masukkan nomor HP yang benar!');
return;
}
document.getElementById('bagian-nomor').style.display = 'none';
document.getElementById('btn-kirim').style.display = 'none';
document.getElementById('bagian-otp').style.display = 'block';
alert('Kode OTP telah dikirim ke nomor Anda (contoh: 123456)');
}

function verifikasiKode(){
const kode = document.getElementById('kodeotp').value;
if(kode.length < 6){
alert('Masukkan 6 digit kode OTP!');
return;
}
const pilih = new URLSearchParams(window.location.search).get('pilih') || '10';
window.location.href = 'isi-nomor-' + pilih + 'jt.html';
}
</script>

</body>
  </html>
