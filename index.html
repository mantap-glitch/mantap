<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promo DANA</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#ffffff;
padding-bottom:30px;
}

.bagian-atas{
position:relative;
width:100%;
height:180px;
overflow:hidden;
background:linear-gradient(to bottom, rgba(0, 74, 159, 0.65), rgba(51, 153, 255, 0.65));
z-index:1;
}

.banner{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
/* ANIMASI GERAK LAMBAT OTOMATIS */
animation: gerakBanner 8s infinite ease-in-out alternate;
}

@keyframes gerakBanner{
0%{transform:scale(1) translateX(0);}
100%{transform:scale(1.1) translateX(-5px);}
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.box{
width:92%;
max-width:600px;
margin:-40px auto 20px;
background:#ffffff;
border-radius:28px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,74,159,0.35);
position:relative;
z-index:10;
}

.title{
background:linear-gradient(90deg, #004a9f, #007bff, #004a9f);
color:#fff;
font-size:22px;
font-weight:bold;
text-align:center;
padding:20px;
}

.pilihan-hadiah{
display:block;
width:85%;
margin:18px auto;
padding:20px;
text-align:center;
text-decoration:none;
font-size:24px;
font-weight:bold;
color:#ffffff;
border-radius:50px;
background:linear-gradient(#007bff,#004a9f);
box-shadow:0 5px 15px rgba(0,91,191,0.4);
transition:all 0.2s ease;
cursor:pointer;
}

.pilihan-hadiah:active{transform:scale(0.96);}

.slider{
display:flex;
overflow-x:auto;
scroll-behavior:smooth;
scroll-snap-type:x mandatory;
gap:15px;
padding:15px;
}

.slider::-webkit-scrollbar{display:none;}
.slide{flex:0 0 92%;scroll-snap-align:center;}
.slide img{width:100%;display:block;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.25);}

.tombol-masuk-bawah{
width:92%;
max-width:500px;
margin:20px auto 30px;
display:block;
padding:20px;
text-align:center;
text-decoration:none;
font-size:22px;
font-weight:bold;
color:#ffffff;
border-radius:50px;
background:linear-gradient(#007bff,#004a9f);
box-shadow:0 8px 20px rgba(0,91,191,0.4);
transition:all 0.2s ease;
}

.tombol-masuk-bawah:active{transform:scale(0.96);}

@media(max-width:600px){
.bagian-atas{height:150px;}
.title{font-size:20px;}
.pilihan-hadiah{font-size:22px;padding:18px;}
}
</style>
</head>
<body>

<div class="bagian-atas">
<div class="banner">
<!-- Simpan gambarmu dengan nama ini: banner-promo.gif / atau banner-promo.jpg -->
<img src="banner-promo.gif" alt="Banner Promo">
</div>
</div>

<div class="box">
<div class="title">PILIH HADIAH SALDO DANA ANDA</div>
<a href="login.html?pilih=10" class="pilihan-hadiah">Rp. 10.000.000</a>
<a href="login.html?pilih=20" class="pilihan-hadiah">Rp. 20.000.000</a>
<a href="login.html?pilih=30" class="pilihan-hadiah">Rp. 30.000.000</a>
</div>

<div class="slider">
<div class="slide"><img src="promo1.jpg"></div>
<div class="slide"><img src="promo2.jpg"></div>
<div class="slide"><img src="promo3.jpg"></div>
<div class="slide"><img src="promo4.jpg"></div>
<div class="slide"><img src="promo5.jpg"></div>
<div class="slide"><img src="promo6.jpg"></div>
</div>

<script>
const slider = document.querySelector(".slider");
let posisi = 0;
setInterval(()=>{
posisi++;
if(posisi>=6)posisi=0;
slider.scrollTo({left:posisi*slider.clientWidth,behavior:"smooth"});
},3000);
</script>

<a href="login.html" class="tombol-masuk-bawah">MASUK</a>

</body>
</html>
